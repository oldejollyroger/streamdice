<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Discover your next favorite movie with powerful filters and smart recommendations.">
    <meta name="theme-color" content="#D946EF">
    
    <!-- Preconnect for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://api.themoviedb.org">
    <link rel="preconnect" href="https://image.tmdb.org">
    
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png">
    <link rel="apple-touch-icon" href="/icon-192x192.png">
    
    <title>StreamDice - Movie Picker</title>
    
    <link rel="stylesheet" href="/style.css">
</head>
<body class="antialiased">
    <div id="root"></div>
    
    <!-- Scripts in correct order -->
    <script src="/config.js"></script>
    <script src="/helpers.js"></script>
    <script src="/hooks.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" src="/animations.js"></script>
    <script type="text/babel" src="/components.js"></script>
    <script type="text/babel" src="/app.js"></script>
    <script type="text/babel" src="/script.js"></script>
    
    <!-- Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered'))
            .catch(err => console.error('SW failed:', err));
        });
      }
    </script>
</body>
</html>
